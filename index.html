<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>F4 Magazzino</title>
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css?v=23">
  <link rel="stylesheet" href="css/print.css?v=23" media="print">
</head>
<body>

<!-- SPINNER -->
<div id="f4-spinner" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div class="spinner-ring"></div>
  <div class="spinner-msg" style="color:#fff;font-size:14px;font-weight:600;">Caricamento...</div>
</div>

<!-- LAYOUT PRINCIPALE -->
<div id="app-layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <img src="icon.png" alt="F4" class="brand-logo" onerror="this.style.display='none'">
      <span class="brand-name">F4 Magazzino</span>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <!-- MAIN -->
  <div id="main-wrap">

    <!-- TOPBAR -->
    <header id="topbar">
      <button id="hamburger" class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <span id="topbar-title">F4 Magazzino</span>
      <div class="topbar-right">
        <span id="user-name" class="user-name"></span>
        <button id="btn-esci" class="btn btn-outline btn-sm">Esci</button>
      </div>
    </header>

    <!-- VIEW CONTAINER -->
    <main id="view-container"></main>

  </div>
</div>

<!-- CONFIG — deve stare prima di api.js -->
<script src="js/config.js?v=23"></script>
<!-- API -->
<script src="js/api.js?v=23"></script>
<!-- VIEWS -->
<script src="js/views.js?v=23"></script>
<!-- REPORT -->
<script src="js/report.js?v=23"></script>
<!-- APP (router + init) -->
<script src="js/app.js?v=23"></script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function() {});
}
</script>

</body>
</html>
